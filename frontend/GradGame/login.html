<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Malsy</title>
    <link rel="stylesheet" href="styles-login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-section">
                <h1>🎓 Malsy</h1>
                <p>Your Learning Adventure Starts Here!</p>
            </div>

            <!-- Login Form -->
            <div class="form-container active" id="loginForm">
                <h2>Welcome Back!</h2>
                <form id="loginFormElement">
                    <div class="form-group">
                        <label for="loginId">Student ID</label>
                        <input type="text" id="loginId" placeholder="Enter your Student ID" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                    <p class="switch-form">
                        Don't have an account? <a href="#" id="showSignup">Sign Up</a>
                    </p>
                </form>
            </div>

            <!-- Signup Form -->
            <div class="form-container" id="signupForm">
                <h2>Create Your Account</h2>
                <form id="signupFormElement">
                    <div class="form-group">
                        <label for="signupName">Full Name</label>
                        <input type="text" id="signupName" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label for="signupId">Student ID</label>
                        <input type="text" id="signupId" placeholder="Choose a Student ID" required>
                        <small>This will be your username</small>
                    </div>
                    <div class="form-group">
                        <label for="signupEmail">Email</label>
                        <input type="email" id="signupEmail" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" placeholder="Create a password" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="signupConfirmPassword">Confirm Password</label>
                        <input type="password" id="signupConfirmPassword" placeholder="Confirm your password" required>
                    </div>
                    <div class="form-group">
                        <label for="signupPicture">Profile Picture URL (Optional)</label>
                        <input type="url" id="signupPicture" placeholder="https://example.com/picture.jpg">
                        <small>Or leave blank to use default avatar</small>
                    </div>
                    <button type="submit" class="btn btn-primary">Sign Up</button>
                    <p class="switch-form">
                        Already have an account? <a href="#" id="showLogin">Login</a>
                    </p>
                </form>
            </div>

            <!-- Message Display -->
            <div class="message" id="message"></div>
        </div>
    </div>

    <script src="database.js"></script>
    <script src="login.js"></script>
</body>
</html>
