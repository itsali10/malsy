<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational Games - Malsy</title>
    <link rel="stylesheet" href="styles-games.css">
</head>
<body>
    <div class="games-container">
        <header class="games-header">
            <button class="btn-back" id="backBtn">← Back to Dashboard</button>
            <h1>🎮 Educational Games</h1>
        </header>

        <main class="games-main">
            <div class="games-grid">
                <div class="game-card" data-game="hangman">
                    <div class="game-icon">🎯</div>
                    <h2>Hangman</h2>
                    <p>Guess the word before the hangman is drawn!</p>
                    <div class="game-stats" id="hangmanStats">
                        <span>Best Score: <span id="hangmanBest">0</span></span>
                    </div>
                    <button class="btn-play">Play Now</button>
                </div>

                <div class="game-card" data-game="spellingBee">
                    <div class="game-icon">🐝</div>
                    <h2>Spelling Bee</h2>
                    <p>Test your spelling skills with challenging words!</p>
                    <div class="game-stats" id="spellingStats">
                        <span>Best Score: <span id="spellingBest">0</span></span>
                    </div>
                    <button class="btn-play">Play Now</button>
                </div>
            </div>
        </main>
    </div>

    <script src="database.js"></script>
    <script src="services/auth-service.js"></script>
    <script src="features/instructor-avatar.js"></script>
    <script src="games.js"></script>
</body>
</html>
