<!DOCTYPE html>
<html>
<head>
    <title>Test - Chemistry Lab</title>
</head>
<body>
    <h1>Testing Chemistry Lab Files</h1>
    <p>If you see this, HTML is working.</p>
    <script>
        console.log('Test script loaded');
        // Test if main script loads
        const script = document.createElement('script');
        script.src = 'script.js';
        script.onload = function() {
            console.log('script.js loaded successfully');
            document.body.innerHTML += '<p style="color: green;">✓ script.js loaded</p>';
        };
        script.onerror = function() {
            console.error('script.js failed to load');
            document.body.innerHTML += '<p style="color: red;">✗ script.js failed to load</p>';
        };
        document.head.appendChild(script);
        
        // Test CSS
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'styles.css';
        link.onload = function() {
            console.log('styles.css loaded successfully');
            document.body.innerHTML += '<p style="color: green;">✓ styles.css loaded</p>';
        };
        link.onerror = function() {
            console.error('styles.css failed to load');
            document.body.innerHTML += '<p style="color: red;">✗ styles.css failed to load</p>';
        };
        document.head.appendChild(link);
    </script>
</body>
</html>
