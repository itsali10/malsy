<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Report - Malsy</title>
    <link rel="stylesheet" href="styles-grades.css">
</head>
<body>
    <div class="grades-container">
        <header class="grades-header">
            <div class="header-left">
                <button class="btn-back" id="backBtn">← Dashboard</button>
                <h1>📊 Grade Report</h1>
            </div>
            <div class="header-right">
                <span class="year-label" id="yearLabel"></span>
                <button class="btn-print" id="printBtn" type="button">🖨 Print Report</button>
            </div>
        </header>

        <!-- Student summary banner -->
        <section class="student-banner" id="studentBanner">
            <div class="banner-avatar">
                <img id="bannerPicture" src="" alt="Student picture">
            </div>
            <div class="banner-info">
                <h2 id="bannerName">Loading…</h2>
                <p>Student ID: <strong id="bannerId">—</strong></p>
            </div>
            <div class="banner-overall" id="bannerOverall">
                <span class="overall-number" id="overallValue">—</span>
                <span class="overall-letter" id="overallLetter">—</span>
                <span class="overall-label" id="overallStatus">—</span>
            </div>
        </section>

        <!-- Subject tabs -->
        <nav class="subject-tabs" id="subjectTabs" role="tablist">
            <button class="tab-btn active" data-subject="english"       role="tab">📚 English</button>
            <button class="tab-btn"        data-subject="science"       role="tab">🔬 Science</button>
            <button class="tab-btn"        data-subject="socialStudies" role="tab">🌍 Social Studies</button>
        </nav>

        <!-- Grade entry + breakdown panels -->
        <main class="grades-main" id="gradesMain"></main>
    </div>

    <!-- Dependency order: models → utils → services → page controller -->
    <script src="database.js"></script>
    <script src="models/Grade.js"></script>
    <script src="models/Semester.js"></script>
    <script src="models/AcademicRecord.js"></script>
    <script src="utils/grade-validator.js"></script>
    <script src="utils/grade-helpers.js"></script>
    <script src="services/grade-calculator.js"></script>
    <script src="services/grade-database.js"></script>
    <script src="services/grade-report.js"></script>
    <script src="services/auth-service.js"></script>
    <script src="features/instructor-avatar.js"></script>
    <script src="grades.js"></script>
</body>
</html>
